spring.application.name=user-service
server.port=8081
client-service.base-url=${CLIENT_SERVICE_URL:http://localhost:8082}

# # --- AWS RDS CONNECTION ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- CONNECTION POOLING ---
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000

# --- GRACEFUL SHUTDOWN ---
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# --- SQS ---
log.queue.url=${LOG_QUEUE_URL}

# --- INTERNAL SERVICE AUTH ---
internal.service.key=${INTERNAL_SERVICE_KEY}

# --- COGNITO ---
cognito.region=${COGNITO_REGION:ap-southeast-1}
cognito.user-pool-id=${COGNITO_USER_POOL_ID}

# --- DYNAMODB ---
aws.dynamodb.log-table=${LOG_DYNAMODB_TABLE:accord-crm-log}

# --- FLYWAY ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

#For Health Check
management.endpoints.web.exposure.include=health
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=always

# management.server.port intentionally omitted — shares server.port