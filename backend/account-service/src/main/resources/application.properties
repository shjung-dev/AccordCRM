spring.application.name=account-service
server.port=8083

# --- AWS RDS CONNECTION ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- CONNECTION POOLING ---
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000

# --- GRACEFUL SHUTDOWN ---
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# --- SQS ---
log.queue.url=${LOG_QUEUE_URL}
email.queue.url=${EMAIL_QUEUE_URL}

# --- AWS SES (uses EC2 IAM role, no credentials needed) ---
aws.region=${AWS_REGION:ap-southeast-1}

# --- CLIENT SERVICE INTEGRATION ---
client.service.url=${CLIENT_SERVICE_URL}

# --- USER SERVICE INTEGRATION ---
user.service.url=${USER_SERVICE_URL}
internal.service.key=${INTERNAL_SERVICE_KEY}

# --- REDIS CACHE ---
# AI Output Redis — Bedrock responses and risk scores
redis.ai-output.host=${AI_OUTPUT_REDIS_HOST:localhost}
redis.ai-output.port=${AI_OUTPUT_REDIS_PORT:6379}

# Account & Transaction Redis — account entity cache
redis.account-transaction.host=${ACCOUNT_TRANSACTION_REDIS_HOST:localhost}
redis.account-transaction.port=${ACCOUNT_TRANSACTION_REDIS_PORT:6379}

# Disable Spring Boot Redis auto-configuration (we configure both factories manually)
# New package names cover Spring Boot 3.4+; old names kept for compatibility with earlier 3.x
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration,\
  org.springframework.boot.data.redis.autoconfigure.DataRedisReactiveAutoConfiguration

# --- DYNAMODB ---
aws.dynamodb.risk-score-table=${RISK_SCORE_TABLE:accord-crm-risk-score}
aws.dynamodb.ai-chatbot-audit-table=${AI_CHATBOT_AUDIT_TABLE:accord-crm-ai-chatbot-audit}

# --- BEDROCK ---
bedrock.model-id=${BEDROCK_MODEL_ID:global.anthropic.claude-haiku-4-5-20251001-v1:0}


# --- COGNITO ---
cognito.region=${COGNITO_REGION:ap-southeast-1}
cognito.user-pool-id=${COGNITO_USER_POOL_ID}

# --- FLYWAY ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

#For Health Check
management.endpoints.web.exposure.include=health
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=always
management.health.db.enabled=true
management.health.redis.enabled=false

# management.server.port intentionally omitted — shares server.port