spring.application.name=client-service
server.port=8082
# --- AWS RDS CONNECTION ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- CONNECTION POOLING ---
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000

# --- GRACEFUL SHUTDOWN ---
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# --- SQS ---
log.queue.url=${LOG_QUEUE_URL}
email.queue.url=${EMAIL_QUEUE_URL}

# --- REDIS Cache ---
redis.client.host=${CLIENT_REDIS_HOST}
redis.client.port=${CLIENT_REDIS_PORT:6379}



# --- AWS SES (uses EC2 IAM role, no credentials needed) ---
aws.region=${AWS_REGION:ap-southeast-1}


# --- USER SERVICE INTEGRATION ---
user.service.url=${USER_SERVICE_URL:http://localhost:8081}
internal.service.key=${INTERNAL_SERVICE_KEY}

# --- ACCOUNT SERVICE INTEGRATION ---
account.service.url=${ACCOUNT_SERVICE_URL:http://localhost:8083}

# --- COGNITO ---
cognito.region=${COGNITO_REGION:ap-southeast-1}
cognito.user-pool-id=${COGNITO_USER_POOL_ID}

# --- FLYWAY ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

#For Health Check
management.endpoints.web.exposure.include=health
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=always

# management.server.port intentionally omitted — shares server.port