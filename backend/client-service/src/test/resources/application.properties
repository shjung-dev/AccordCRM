# Use H2 in-memory database instead of PostgreSQL
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Flyway auto-config (manual FlywayConfig bean is mocked in test)
spring.flyway.enabled=false

# Fake Redis config (bean is mocked in test so no actual connection is made)
redis.client.host=localhost
redis.client.port=6379

# Fake SQS queue URLs
log.queue.url=https://sqs.ap-southeast-1.amazonaws.com/000000000000/fake-log-queue
email.queue.url=https://sqs.ap-southeast-1.amazonaws.com/000000000000/fake-email-queue

# Fake Cognito config
cognito.region=ap-southeast-1
cognito.user-pool-id=ap-southeast-1_TESTPOOLID

# Fake internal service key
internal.service.key=test-internal-key

# Service URLs
user.service.url=http://localhost:8081
account.service.url=http://localhost:8083

# AWS region
aws.region=ap-southeast-1
